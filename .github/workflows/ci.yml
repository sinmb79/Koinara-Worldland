name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  node-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static sanity checks
        run: npm run ci:sanity

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Canary scaffold
        run: npm run e2e
